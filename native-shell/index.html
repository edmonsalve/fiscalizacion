<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fiscalizacion Petorca</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef8fb;
      --surface: #ffffff;
      --text: #17344f;
      --muted: #5f7891;
      --primary: #124f87;
      --border: #cfe4ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, #f4fcfe 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(100%, 480px);
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: var(--muted);
    }

    strong {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <main>
    <h1>Fiscalizacion Petorca</h1>
    <p>
      Esta shell nativa necesita una URL HTTPS valida en <strong>capacitor.config.json</strong>
      para cargar la aplicacion movil.
    </p>
  </main>
</body>
</html>
